version: 2

before:
  hooks:
    - go mod tidy
    - ./scripts/completions.sh

builds:
  - id: linkdingctl
    binary: linkdingctl
    main: ./cmd/linkdingctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE.md
      - README.md
      - completions/*

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"
  algorithm: sha256

changelog:
  disable: true

release:
  github:
    owner: rodmhgl
    name: linkdingctl
  mode: append
  replace_existing_artifacts: true

brews:
  - repository:
      owner: rodmhgl
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    name: linkdingctl
    homepage: "https://github.com/rodmhgl/linkdingctl"
    description: "CLI for managing bookmarks in a LinkDing instance"
    license: "MIT"
    directory: Formula
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    install: |
      bin.install "linkdingctl"
      bash_completion.install "completions/linkdingctl.bash" => "linkdingctl"
      zsh_completion.install "completions/linkdingctl.zsh" => "_linkdingctl"
      fish_completion.install "completions/linkdingctl.fish"
    test: |
      system "#{bin}/linkdingctl", "version"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
